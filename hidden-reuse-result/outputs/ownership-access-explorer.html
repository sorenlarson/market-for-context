html&gt;body{padding:0}&lt;/style&gt;

  &lt;div class=&quot;viz-grid&quot;&gt;

  &lt;svg class=&quot;oal-chart&quot; viewBox=&quot;0 0 720 350&quot; role=&quot;img&quot; aria-labelledby=&quot;oal-title oal-desc&quot;&gt;
    &lt;title id=&quot;oal-title&quot;&gt;Ownership and customer access in a directed learning network&lt;/title&gt;
    &lt;desc id=&quot;oal-desc&quot;&gt;Adjustable six-node network showing which clinics, laboratories, and payers a common AI intermediary acquires.&lt;/desc&gt;
    &lt;defs&gt;
      &lt;marker id=&quot;oal-learning-arrow&quot; markerWidth=&quot;7&quot; markerHeight=&quot;7&quot; refX=&quot;6&quot; refY=&quot;3.5&quot; orient=&quot;auto&quot; markerUnits=&quot;strokeWidth&quot;&gt;

        &lt;path d=&quot;M0,0 L7,3.5 L0,7 Z&quot; fill=&quot;var(--destructive)&quot;&gt;&lt;/path&gt;
      &lt;/marker&gt;
    &lt;/defs&gt;
    &lt;g id=&quot;oal-learning-edges&quot;&gt;&lt;/g&gt;
    &lt;g id=&quot;oal-customer-edges&quot;&gt;&lt;/g&gt;

  &lt;/svg&gt;

  &lt;div class=&quot;viz-row text-small&quot; aria-label=&quot;Network legend&quot;&gt;
    &lt;span&gt;&lt;span class=&quot;oal-swatch oal-clinic-swatch&quot;&gt;&lt;/span&gt;Clinic&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;oal-swatch oal-lab-swatch&quot;&gt;&lt;/span&gt;Laboratory&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;oal-swatch oal-payer-swatch&quot;&gt;&lt;/span&gt;Payer&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;oal-swatch oal-cut-swatch&quot;&gt;&lt;/span&gt;Customer tie cut by ownership&lt;/span&gt;
  &lt;/div&gt;
  &lt;p id=&quot;oal-detail&quot; class=&quot;text-small text-muted&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;ownership-access-lab&#x27;);
      const access = root.querySelector(&#x27;#oal-access&#x27;);
      const conflict = root.querySelector(&#x27;#oal-conflict&#x27;);
      const topology = root.querySelector(&#x27;#oal-topology&#x27;);
      const accessValue = root.querySelector(&#x27;#oal-access-value&#x27;);
      const conflictValue = root.querySelector(&#x27;#oal-conflict-value&#x27;);
      const regimeValue = root.querySelector(&#x27;#oal-regime&#x27;);
      const sizeValue = root.querySelector(&#x27;#oal-size&#x27;);
      const gainValue = root.querySelector(&#x27;#oal-value&#x27;);
      const detail = root.querySelector(&#x27;#oal-detail&#x27;);
      const learningLayer = root.querySelector(&#x27;#oal-learning-edges&#x27;);
      const customerLayer = root.querySelector(&#x27;#oal-customer-edges&#x27;);
      const nodeLayer = root.querySelector(&#x27;#oal-nodes&#x27;);
      const svgNS = &#x27;http://www.w3.org/2000/svg&#x27;;

      const nodes = [
        { name: &#x27;clinic_east&#x27;, label: &#x27;Clinic east&#x27;, kind: &#x27;clinic&#x27;, advantage: 0.18, x: 100, y: 95 },
        { name: &#x27;clinic_west&#x27;, label: &#x27;Clinic west&#x27;, kind: &#x27;clinic&#x27;, advantage: 0.16, x: 100, y: 255 },
        { name: &#x27;lab_east&#x27;, label: &#x27;Lab east&#x27;, kind: &#x27;lab&#x27;, advantage: 0.14, x: 360, y: 95 },
        { name: &#x27;lab_west&#x27;, label: &#x27;Lab west&#x27;, kind: &#x27;lab&#x27;, advantage: 0.12, x: 360, y: 255 },
        { name: &#x27;payer_east&#x27;, label: &#x27;Payer east&#x27;, kind: &#x27;payer&#x27;, advantage: -0.03, x: 620, y: 95 },
        { name: &#x27;payer_west&#x27;, label: &#x27;Payer west&#x27;, kind: &#x27;payer&#x27;, advantage: -0.05, x: 620, y: 255 }
      ];
      const typeLearning = {
        &#x27;clinic:clinic&#x27;: 0.04, &#x27;lab:lab&#x27;: 0.05, &#x27;payer:payer&#x27;: 0.03,
        &#x27;clinic:lab&#x27;: 0.13, &#x27;lab:clinic&#x27;: 0.18,
        &#x27;clinic:payer&#x27;: 0.12, &#x27;payer:clinic&#x27;: 0.10,
        &#x27;lab:payer&#x27;: 0.08, &#x27;payer:lab&#x27;: 0.06
      };
      const customerBase = {
        &#x27;clinic:lab&#x27;: 0.08,
        &#x27;payer:clinic&#x27;: 0.10,
        &#x27;lab:payer&#x27;: 0.06
      };

      function zeroMatrix() {
        return nodes.map(() =&gt; nodes.map(() =&gt; 0));
      }

      function matrices(mode) {
        const complementary = zeroMatrix();
        for (let i = 0; i &lt; nodes.length; i += 1) {
          for (let j = 0; j &lt; nodes.length; j += 1) {
            if (i === j) continue;
            const multiplier = i % 2 === j % 2 ? 1.30 : 0.75;
            complementary[i][j] = typeLearning[`${nodes[i].kind}:${nodes[j].kind}`] * multiplier;
          }
        }
        let learning = complementary;
        if (mode === &#x27;within_type&#x27;) {
          const total = complementary.flat().reduce((sum, value) =&gt; sum + value, 0);
          const withinCount = nodes.reduce((count, source, i) =&gt; count + nodes.filter((target, j) =&gt; i !== j &amp;&amp; source.kind === target.kind).length, 0);
          learning = zeroMatrix();
          for (let i = 0; i &lt; nodes.length; i += 1) {
            for (let j = 0; j &lt; nodes.length; j += 1) {
              if (i !== j &amp;&amp; nodes[i].kind === nodes[j].kind) learning[i][j] = total / withinCount;
            }
          }
        }
        const customer = zeroMatrix();
        const coordination = zeroMatrix();
        for (let i = 0; i &lt; nodes.length; i += 1) {
          for (let j = 0; j &lt; nodes.length; j += 1) {
            if (i === j) continue;
            const multiplier = i % 2 === j % 2 ? 1.0 : 0.35;
            customer[i][j] = (customerBase[`${nodes[i].kind}:${nodes[j].kind}`] || 0.005) * multiplier;
            coordination[i][j] = nodes[i].kind === nodes[j].kind ? 0.008 : 0.025;
          }
        }
        return { learning, customer, coordination };
      }

      function candidate(mask, q, chi, data) {
        const owned = nodes.map((_, index) =&gt; Boolean(mask &amp; (1 &lt;&lt; index)));
        const size = owned.filter(Boolean).length;
        let direct = 0;
        let internalLearning = 0;
        let coordination = 0;
        let exposure = 0;
        for (let i = 0; i &lt; nodes.length; i += 1) {
          if (owned[i]) direct += nodes[i].advantage;
          for (let j = 0; j &lt; nodes.length; j += 1) {
            if (i !== j &amp;&amp; owned[i] &amp;&amp; owned[j]) internalLearning += data.learning[i][j];
            if (owned[i] !== owned[j]) exposure += data.customer[i][j];
            if (i &lt; j &amp;&amp; owned[i] &amp;&amp; owned[j]) coordination += data.coordination[i][j];
          }
        }
        const learningUpgrade = (1 - q) * internalLearning;
        const fixed = size ? 0.16 : 0;
        const organization = size ? 0.065 * Math.pow(size, 1.65) : 0;
        const customerLoss = chi * exposure;
        const incremental = direct + learningUpgrade - fixed - organization - coordination - customerLoss;
        return { mask, owned, size, direct, learningUpgrade, fixed, organization, coordination, exposure, customerLoss, incremental };
      }

      function solve(q, chi, data) {
        const candidates = [];
        for (let mask = 0; mask &lt; (1 &lt;&lt; nodes.length); mask += 1) candidates.push(candidate(mask, q, chi, data));
        candidates.sort((a, b) =&gt; {
          if (Math.abs(a.incremental - b.incremental) &gt; 1e-10) return b.incremental - a.incremental;
          if (a.size !== b.size) return a.size - b.size;
          return a.mask - b.mask;
        });
        return { best: candidates[0], margin: candidates[0].incremental - candidates[1].incremental };
      }

      function regime(candidate) {
        if (candidate.size === 0) return &#x27;Neutral platform&#x27;;
        if (candidate.size === nodes.length) return &#x27;Full-network rollup&#x27;;
        if (candidate.size === 1) return &#x27;One acquired asset&#x27;;
        const kinds = new Set(nodes.filter((_, index) =&gt; candidate.owned[index]).map(node =&gt; node.kind));
        return kinds.size === 1 ? &#x27;Specialized partial rollup&#x27; : &#x27;Cross-type partial rollup&#x27;;
      }

      function edgePath(source, target, bend) {
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const length = Math.hypot(dx, dy);
        const ux = dx / length;
        const uy = dy / length;
        const startX = source.x + ux * 31;
        const startY = source.y + uy * 31;
        const endX = target.x - ux * 34;
        const endY = target.y - uy * 34;
        const midX = (startX + endX) / 2 - uy * bend;
        const midY = (startY + endY) / 2 + ux * bend;
        return `M${startX.toFixed(1)},${startY.toFixed(1)} Q${midX.toFixed(1)},${midY.toFixed(1)} ${endX.toFixed(1)},${endY.toFixed(1)}`;
      }

      function appendPath(layer, className, source, target, bend, width, opacity, marker) {
        const path = document.createElementNS(svgNS, &#x27;path&#x27;);
        path.setAttribute(&#x27;class&#x27;, className);
        path.setAttribute(&#x27;d&#x27;, edgePath(source, target, bend));
        if (width) path.setAttribute(&#x27;stroke-width&#x27;, width);
        if (opacity) path.setAttribute(&#x27;opacity&#x27;, opacity);
        path.setAttribute(&#x27;marker-end&#x27;, `url(#${marker})`);
        layer.appendChild(path);
      }

      function renderGraph(data, selected) {
        learningLayer.replaceChildren();
        customerLayer.replaceChildren();
        nodeLayer.replaceChildren();
        const maximum = Math.max(...data.learning.flat());
        const cutoff = 0.20 * maximum;
        for (let i = 0; i &lt; nodes.length; i += 1) {
          for (let j = 0; j &lt; nodes.length; j += 1) {
            const weight = data.learning[i][j];
            if (weight &gt;= cutoff) {
              const bend = i &lt; j ? 13 : -13;
              appendPath(
                learningLayer,
                &#x27;oal-learning&#x27;,
                nodes[i],
                nodes[j],
                bend,
                (0.7 + 3.0 * weight / maximum).toFixed(2),
                (0.20 + 0.55 * weight / maximum).toFixed(2),
                &#x27;oal-learning-arrow&#x27;
              );
            }
            if (selected.owned[i] !== selected.owned[j] &amp;&amp; data.customer[i][j] &gt;= 0.03) {
              appendPath(customerLayer, &#x27;oal-customer-cut&#x27;, nodes[i], nodes[j], i &lt; j ? 20 : -20, null, null, &#x27;oal-cut-arrow&#x27;);
            }
          }
        }
        nodes.forEach((node, index) =&gt; {
          const group = document.createElementNS(svgNS, &#x27;g&#x27;);
          group.setAttribute(&#x27;class&#x27;, `oal-node oal-${node.kind}${selected.owned[index] ? &#x27; is-owned&#x27; : &#x27;&#x27;}`);
          const title = document.createElementNS(svgNS, &#x27;title&#x27;);
          title.textContent = `${node.label}: ${selected.owned[index] ? &#x27;owned&#x27; : &#x27;independent&#x27;}`;
          const circle = document.createElementNS(svgNS, &#x27;circle&#x27;);
          circle.setAttribute(&#x27;cx&#x27;, node.x);
          circle.setAttribute(&#x27;cy&#x27;, node.y);
          circle.setAttribute(&#x27;r&#x27;, 28);
          const label = document.createElementNS(svgNS, &#x27;text&#x27;);
          label.setAttribute(&#x27;x&#x27;, node.x);
          label.setAttribute(&#x27;y&#x27;, node.y + 49);
          label.setAttribute(&#x27;class&#x27;, &#x27;text-small&#x27;);
          label.textContent = node.label;
          group.append(title, circle, label);
          nodeLayer.appendChild(group);
        });
      }

      function render() {
        const q = Number(access.value);
        const chi = Number(conflict.value);
        const data = matrices(topology.value);
        const solution = solve(q, chi, data);
        const best = solution.best;
        accessValue.textContent = q.toFixed(2);
        conflictValue.textContent = chi.toFixed(2);
        regimeValue.textContent = regime(best);
        sizeValue.textContent = `${best.size} / ${nodes.length}`;
        gainValue.textContent = best.incremental.toFixed(3);
        const ownedNames = nodes.filter((_, index) =&gt; best.owned[index]).map(node =&gt; node.label).join(&#x27;, &#x27;) || &#x27;none&#x27;;
        const costs = best.fixed + best.organization + best.coordination;
        detail.textContent = `Owned: ${ownedNames} · direct ${best.direct.toFixed(3)} · learning upgrade ${best.learningUpgrade.toFixed(3)} · ownership costs ${costs.toFixed(3)} · customer loss ${best.customerLoss.toFixed(3)} · lead over next subset ${solution.margin.toFixed(3)}`;
        renderGraph(data, best);
      }

      access.addEventListener(&#x27;input&#x27;, render);
      conflict.addEventListener(&#x27;input&#x27;, render);
      topology.addEventListener(&#x27;change&#x27;, render);
      render();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
