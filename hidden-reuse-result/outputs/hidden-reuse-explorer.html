&lt;body&gt;

    &lt;label class=&quot;form-label&quot; for=&quot;hidden-reuse-provider-gain&quot;&gt;
      Provider future leverage g: &lt;span id=&quot;hidden-reuse-provider-gain-value&quot;&gt;0.45&lt;/span&gt;

    &lt;label class=&quot;form-label&quot; for=&quot;hidden-reuse-monitor-cost&quot;&gt;

      &lt;input id=&quot;hidden-reuse-monitor-cost&quot; class=&quot;form-range&quot; type=&quot;range&quot; min=&quot;0.05&quot; max=&quot;0.80&quot; step=&quot;0.01&quot; value=&quot;0.25&quot;&gt;

  &lt;svg class=&quot;hidden-reuse-chart&quot; viewBox=&quot;0 0 720 430&quot; role=&quot;img&quot; aria-labelledby=&quot;hidden-reuse-svg-title hidden-reuse-svg-description&quot;&gt;

    &lt;path id=&quot;hidden-reuse-secure-area&quot; class=&quot;hidden-reuse-cell-path hidden-reuse-secure&quot;&gt;&lt;/path&gt;
    &lt;path id=&quot;hidden-reuse-leaky-area&quot; class=&quot;hidden-reuse-cell-path hidden-reuse-leaky&quot;&gt;&lt;/path&gt;
    &lt;path id=&quot;hidden-reuse-withholding-area&quot; class=&quot;hidden-reuse-cell-path hidden-reuse-withholding&quot;&gt;&lt;/path&gt;
    &lt;path id=&quot;hidden-reuse-ownership-area&quot; class=&quot;hidden-reuse-cell-path hidden-reuse-ownership&quot;&gt;&lt;/path&gt;
    &lt;path class=&quot;hidden-reuse-axis&quot; d=&quot;M70 20V370H680&quot;&gt;&lt;/path&gt;
    &lt;g id=&quot;hidden-reuse-ticks&quot;&gt;&lt;/g&gt;
    &lt;circle class=&quot;hidden-reuse-reference&quot; cx=&quot;222.5&quot; cy=&quot;115.45&quot; r=&quot;5&quot;&gt;&lt;/circle&gt;
    &lt;text class=&quot;hidden-reuse-axis-label&quot; x=&quot;375&quot; y=&quot;418&quot;&gt;Maximum enforceable sanction, E&lt;/text&gt;
    &lt;text class=&quot;hidden-reuse-axis-label&quot; x=&quot;18&quot; y=&quot;195&quot; transform=&quot;rotate(-90 18 195)&quot;&gt;Integration cost, F&lt;/text&gt;

  &lt;div class=&quot;viz-row text-small&quot; aria-label=&quot;Regime legend&quot;&gt;
    &lt;span&gt;&lt;span class=&quot;hidden-reuse-swatch hidden-reuse-swatch-secure&quot;&gt;&lt;/span&gt;Secure modularity&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;hidden-reuse-swatch hidden-reuse-swatch-leaky&quot;&gt;&lt;/span&gt;Priced reuse&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;hidden-reuse-swatch hidden-reuse-swatch-withholding&quot;&gt;&lt;/span&gt;Strategic withholding&lt;/span&gt;
    &lt;span&gt;&lt;span class=&quot;hidden-reuse-swatch hidden-reuse-swatch-ownership&quot;&gt;&lt;/span&gt;Ownership&lt;/span&gt;
  &lt;/div&gt;
  &lt;p id=&quot;hidden-reuse-detail&quot; class=&quot;text-small text-muted&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;hidden-reuse-game&#x27;);
      const paymentCapInput = root.querySelector(&#x27;#hidden-reuse-payment-cap&#x27;);
      const providerGainInput = root.querySelector(&#x27;#hidden-reuse-provider-gain&#x27;);
      const monitorCostInput = root.querySelector(&#x27;#hidden-reuse-monitor-cost&#x27;);
      const paymentCapValue = root.querySelector(&#x27;#hidden-reuse-payment-cap-value&#x27;);
      const providerGainValue = root.querySelector(&#x27;#hidden-reuse-provider-gain-value&#x27;);
      const monitorCostValue = root.querySelector(&#x27;#hidden-reuse-monitor-cost-value&#x27;);
      const secureArea = root.querySelector(&#x27;#hidden-reuse-secure-area&#x27;);
      const leakyArea = root.querySelector(&#x27;#hidden-reuse-leaky-area&#x27;);
      const withholdingArea = root.querySelector(&#x27;#hidden-reuse-withholding-area&#x27;);
      const ownershipArea = root.querySelector(&#x27;#hidden-reuse-ownership-area&#x27;);
      const detail = root.querySelector(&#x27;#hidden-reuse-detail&#x27;);
      const grid = root.querySelector(&#x27;#hidden-reuse-grid&#x27;);
      const ticks = root.querySelector(&#x27;#hidden-reuse-ticks&#x27;);
      const svgNS = &#x27;http://www.w3.org/2000/svg&#x27;;
      const plot = { x: 70, y: 20, width: 610, height: 350 };
      const maxEnforcement = 0.8;
      const maxIntegrationCost = 1.1;
      const gridSize = 31;
      const disclosureGrid = 61;

      const constants = {
        marginalAtFull: 0.55,
        curvature: 0.45,
        discount: 0.90,
        renewalSurplus: 0.80,
        multihomeValue: 0.42,
        integrationValue: 0.62,
        ownerReuseLoss: 0.75,
        capabilityGain: 0.25,
        providerOutsideBase: 0.08,
        reuseCost: 0.02,
        providerInitialOutside: 0.05,
        betaOne: 0.50,
        betaTwo: 0.50
      };

      const xScale = value =&gt; plot.x + value / maxEnforcement * plot.width;
      const yScale = value =&gt; plot.y + plot.height - value / maxIntegrationCost * plot.height;

      function benefit(disclosure) {
        return (constants.marginalAtFull + constants.curvature) * disclosure
          - 0.5 * constants.curvature * disclosure * disclosure;
      }

      function periodTwo(reuse, integrationCost, providerOutsideGain) {
        const ownerOutside = Math.max(0, constants.multihomeValue, constants.integrationValue - integrationCost);
        const providerOutside = constants.providerOutsideBase + providerOutsideGain * reuse;
        const renewal = constants.renewalSurplus + constants.capabilityGain * reuse;
        const surplus = renewal - ownerOutside - providerOutside;
        let ownerOperating;
        let provider;
        let route;
        if (surplus &gt;= 0) {
          ownerOperating = ownerOutside + constants.betaTwo * surplus;
          provider = providerOutside + (1 - constants.betaTwo) * surplus;
          route = &#x27;renew&#x27;;
        } else {
          ownerOperating = ownerOutside;
          provider = providerOutside;
          route = constants.integrationValue - integrationCost &gt;= Math.max(0, constants.multihomeValue)
            ? &#x27;integrate&#x27;
            : &#x27;multi-home&#x27;;
        }
        return {
          owner: ownerOperating - constants.ownerReuseLoss * reuse,
          provider,
          route
        };
      }

      function initialOutside(integrationCost) {
        const integrateNow = benefit(1) + constants.discount * constants.integrationValue - integrationCost;
        const wait = constants.discount * Math.max(0, constants.multihomeValue, constants.integrationValue - integrationCost);
        return {
          owner: Math.max(0, integrateNow, wait),
          integrateNow,
          wait
        };
      }

      function reuseGain(disclosure, integrationCost, providerOutsideGain) {
        const clean = periodTwo(0, integrationCost, providerOutsideGain);
        const reused = periodTwo(disclosure, integrationCost, providerOutsideGain);
        return constants.discount * (reused.provider - clean.provider)
          - constants.reuseCost * disclosure;
      }

      function candidate(disclosure, monitoring, reuse, integrationCost, parameters) {
        const continuation = periodTwo(reuse, integrationCost, parameters.providerOutsideGain);
        const monitoringCost = 0.5 * parameters.monitorCost * monitoring * monitoring * disclosure;
        const ownerPre = benefit(disclosure) + constants.discount * continuation.owner;
        const providerPre = constants.discount * continuation.provider
          - constants.reuseCost * reuse - monitoringCost;
        const outside = initialOutside(integrationCost);
        const lower = Math.max(
          constants.providerInitialOutside - providerPre,
          -parameters.paymentCap * disclosure
        );
        const upper = ownerPre - outside.owner;
        if (lower &gt; upper) return null;
        const totalGain = ownerPre + providerPre - outside.owner - constants.providerInitialOutside;
        if (totalGain &lt;= 1e-10) return null;
        const desiredOwner = outside.owner + constants.betaOne * totalGain;
        const unconstrainedTransfer = ownerPre - desiredOwner;
        const transfer = Math.min(upper, Math.max(lower, unconstrainedTransfer));
        const owner = ownerPre - transfer;
        const provider = providerPre + transfer;
        const ownerGain = owner - outside.owner;
        const providerGain = provider - constants.providerInitialOutside;
        if (ownerGain &lt;= 1e-10 || providerGain &lt;= 1e-10) return null;
        return {
          disclosure,
          monitoring,
          reuse,
          transfer,
          owner,
          provider,
          total: owner + provider,
          score: 0.5 * Math.log(ownerGain) + 0.5 * Math.log(providerGain),
          route: continuation.route
        };
      }

      function solve(enforcement, integrationCost, parameters) {
        const outside = initialOutside(integrationCost);
        let best = null;
        for (let index = 1; index &lt;= disclosureGrid; index += 1) {
          const disclosure = index / disclosureGrid;
          const gain = reuseGain(disclosure, integrationCost, parameters.providerOutsideGain);
          const options = [];
          if (gain &gt; 1e-10) {
            options.push(candidate(disclosure, 0, disclosure, integrationCost, parameters));
            if (enforcement &gt; 0) {
              const required = gain / (enforcement * disclosure);
              if (required &lt;= 1 + 1e-10) {
                options.push(candidate(disclosure, Math.min(1, required), 0, integrationCost, parameters));
              }
            }
          } else {
            options.push(candidate(disclosure, 0, 0, integrationCost, parameters));
          }
          options.filter(Boolean).forEach(option =&gt; {
            if (!best || option.score &gt; best.score + 1e-12
              || (Math.abs(option.score - best.score) &lt;= 1e-12 &amp;&amp; option.total &gt; best.total)) {
              best = option;
            }
          });
        }
        if (!best) {
          return {
            regime: outside.integrateNow &gt;= Math.max(0, outside.wait) &amp;&amp; outside.integrateNow &gt; 0
              ? &#x27;ownership&#x27;
              : &#x27;withholding&#x27;,
            disclosure: 0,
            monitoring: 0,
            reuse: 0,
            transfer: 0,
            route: &#x27;none&#x27;
          };
        }
        const full = best.disclosure &gt;= 1 - 1 / disclosureGrid - 1e-10;
        return {
          ...best,
          regime: full ? (best.reuse &gt; 1e-10 ? &#x27;leaky&#x27; : &#x27;secure&#x27;) : &#x27;withholding&#x27;
        };
      }

      function addLine(x1, y1, x2, y2) {
        const line = document.createElementNS(svgNS, &#x27;line&#x27;);
        line.setAttribute(&#x27;x1&#x27;, x1);
        line.setAttribute(&#x27;y1&#x27;, y1);
        line.setAttribute(&#x27;x2&#x27;, x2);
        line.setAttribute(&#x27;y2&#x27;, y2);
        line.setAttribute(&#x27;class&#x27;, &#x27;hidden-reuse-gridline&#x27;);
        grid.appendChild(line);
      }

      function addText(x, y, value, className) {
        const text = document.createElementNS(svgNS, &#x27;text&#x27;);
        text.setAttribute(&#x27;x&#x27;, x);
        text.setAttribute(&#x27;y&#x27;, y);
        text.setAttribute(&#x27;class&#x27;, className);
        text.textContent = value;
        ticks.appendChild(text);
      }

      [0.2, 0.4, 0.6].forEach(value =&gt; addLine(xScale(value), plot.y, xScale(value), plot.y + plot.height));
      [0.275, 0.55, 0.825].forEach(value =&gt; addLine(plot.x, yScale(value), plot.x + plot.width, yScale(value)));
      [0, 0.2, 0.4, 0.6, 0.8].forEach(value =&gt; addText(xScale(value), 391, value.toFixed(1), &#x27;hidden-reuse-tick text-small&#x27;));
      [0, 0.275, 0.55, 0.825, 1.1].forEach(value =&gt; addText(60, yScale(value) + 4, value.toFixed(value === 1.1 ? 1 : 2).replace(/0$/, &#x27;&#x27;), &#x27;hidden-reuse-tick hidden-reuse-y-tick text-small&#x27;));

      function rectanglePath(x0, y0, x1, y1) {
        return `M${x0.toFixed(2)} ${y1.toFixed(2)}H${x1.toFixed(2)}V${y0.toFixed(2)}H${x0.toFixed(2)}Z`;
      }

      function render() {
        const parameters = {
          paymentCap: Number(paymentCapInput.value),
          providerOutsideGain: Number(providerGainInput.value),
          monitorCost: Number(monitorCostInput.value)
        };
        paymentCapValue.textContent = parameters.paymentCap.toFixed(2);
        providerGainValue.textContent = parameters.providerOutsideGain.toFixed(2);
        monitorCostValue.textContent = parameters.monitorCost.toFixed(2);
        const paths = { secure: [], leaky: [], withholding: [], ownership: [] };

        for (let row = 0; row &lt; gridSize; row += 1) {
          const f0 = row / gridSize * maxIntegrationCost;
          const f1 = (row + 1) / gridSize * maxIntegrationCost;
          const integrationCost = (f0 + f1) / 2;
          for (let column = 0; column &lt; gridSize; column += 1) {
            const e0 = column / gridSize * maxEnforcement;
            const e1 = (column + 1) / gridSize * maxEnforcement;
            const enforcement = (e0 + e1) / 2;
            const outcome = solve(enforcement, integrationCost, parameters);
            paths[outcome.regime].push(rectanglePath(xScale(e0), yScale(f0), xScale(e1), yScale(f1)));
          }
        }
        secureArea.setAttribute(&#x27;d&#x27;, paths.secure.join(&#x27;&#x27;));
        leakyArea.setAttribute(&#x27;d&#x27;, paths.leaky.join(&#x27;&#x27;));
        withholdingArea.setAttribute(&#x27;d&#x27;, paths.withholding.join(&#x27;&#x27;));
        ownershipArea.setAttribute(&#x27;d&#x27;, paths.ownership.join(&#x27;&#x27;));

        const reference = solve(0.2, 0.8, parameters);
        const names = {
          secure: &#x27;secure modularity&#x27;,
          leaky: &#x27;priced reuse&#x27;,
          withholding: &#x27;strategic withholding&#x27;,
          ownership: &#x27;ownership&#x27;
        };
        detail.textContent = `At E = 0.20 and F = 0.80: ${names[reference.regime]}, disclosure s = ${reference.disclosure.toFixed(2)}, monitoring k = ${reference.monitoring.toFixed(2)}, reuse r = ${reference.reuse.toFixed(2)}.`;
      }

      [paymentCapInput, providerGainInput, monitorCostInput].forEach(input =&gt; input.addEventListener(&#x27;input&#x27;, render));
      render();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
